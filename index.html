<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZZL个人主页</title>
    <style>
        /* ===== 全局重置 & 基础 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4efe9 100%);
            color: #333;
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 30px;
            position: relative;
            overflow: hidden;
        }

        /* 顶部装饰条 */
        .container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, #4CAF50, #2196F3, #9C27B0);
        }

        /* ===== Header ===== */
        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eaeaea;
        }

        h1 {
            color: #2c3e50;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        h1 a {
            color: #2c3e50;
            text-decoration: none;
            transition: color 0.3s;
        }

        h1 a:hover {
            color: #3498db;
        }

        .contact {
            color: #7f8c8d;
            font-size: 1.1rem;
            margin-top: 5px;
        }

        /* ===== 板块标题 ===== */
        .section {
            margin-bottom: 30px;
        }

        .section-title {
            color: #3498db;
            margin: 0 0 15px 0;
            padding-bottom: 8px;
            border-bottom: 2px solid #eaeaea;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title .badge {
            font-size: 0.8rem;
            background: #3498db;
            color: #fff;
            padding: 2px 12px;
            border-radius: 12px;
            font-weight: 400;
        }

        /* ===== 导航卡片（前三个板块） ===== */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .nav-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 28px 24px;
            transition: all 0.3s ease;
            border-left: 6px solid #3498db;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 130px;
            justify-content: center;
        }

        .nav-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
        }

        .nav-card .nav-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 6px;
        }

        .nav-card .nav-desc {
            color: #7f8c8d;
            font-size: 0.95rem;
        }

        .nav-card .nav-arrow {
            font-size: 1.2rem;
            color: #bdc3c7;
            transition: transform 0.3s, color 0.3s;
            margin-top: 8px;
        }

        .nav-card:hover .nav-arrow {
            transform: translateX(6px);
            color: #3498db;
        }

        /* 各板块专属颜色 */
        .nav-card.hardware {
            border-left-color: #2ecc71;
        }
        .nav-card.hardware:hover {
            border-left-color: #27ae60;
        }
        .nav-card.hardware .nav-arrow {
            color: #2ecc71;
        }

        .nav-card.code {
            border-left-color: #3498db;
        }
        .nav-card.code:hover {
            border-left-color: #2980b9;
        }
        .nav-card.code .nav-arrow {
            color: #3498db;
        }

        .nav-card.articles {
            border-left-color: #9b59b6;
        }
        .nav-card.articles:hover {
            border-left-color: #8e44ad;
        }
        .nav-card.articles .nav-arrow {
            color: #9b59b6;
        }

        /* ===== 工具板块 ===== */
        .filter-controls {
            display: flex;
            gap: 12px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .filter-controls button {
            padding: 6px 18px;
            background: #f1f1f1;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .filter-controls button:hover {
            background: #3498db;
            color: white;
        }

        .filter-controls button.active {
            background: #3498db;
            color: white;
        }

        .search-box {
            margin-bottom: 18px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.15);
        }

        .link-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 18px;
        }

        .link-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 18px 20px 16px;
            transition: all 0.3s ease;
            border-left: 4px solid #e67e22;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .link-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
            border-left-color: #d35400;
        }

        .link-card a {
            color: #2c3e50;
            text-decoration: none;
            font-weight: 500;
            display: block;
            margin-bottom: 6px;
            font-size: 1.05rem;
        }

        .link-card a:hover {
            color: #3498db;
        }

        .link-description {
            color: #7f8c8d;
            font-size: 0.92rem;
            flex-grow: 1;
            margin-bottom: 8px;
        }

        .link-meta {
            display: flex;
            justify-content: space-between;
            color: #95a5a6;
            font-size: 0.8rem;
            border-top: 1px solid #eee;
            padding-top: 8px;
            margin-top: auto;
        }

        .link-card .tool-tag {
            background: #e67e22;
            color: #fff;
            font-size: 0.7rem;
            padding: 1px 10px;
            border-radius: 10px;
            display: inline-block;
            margin-top: 4px;
        }

        /* ===== 通用 ===== */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, #ddd, transparent);
            margin: 28px 0;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            color: #7f8c8d;
            font-size: 0.9rem;
        }

        footer a {
            color: #3498db;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #7f8c8d;
        }

        .error-message {
            color: #e74c3c;
            text-align: center;
            padding: 20px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .container {
                padding: 18px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .nav-grid {
                grid-template-columns: 1fr;
            }

            .link-grid {
                grid-template-columns: 1fr;
            }

            .filter-controls {
                flex-direction: row;
                flex-wrap: wrap;
            }

            .section-title {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .container {
                padding: 14px;
            }
            .nav-card {
                padding: 20px 18px;
                min-height: 100px;
            }
            .nav-card .nav-title {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- ===== HEADER ===== -->
        <header>
            <h1><a href="https://github.com/1225297600" target="_blank">ZZL个人主页</a></h1>
            <div class="contact">1225297600@qq.com</div>
        </header>

        <!-- ===== 1. 硬件工程 ===== -->
        <div class="section">
            <h2 class="section-title">硬件工程</h2>
            <div class="nav-grid">
                <a href="https://oshwhub.com/zzl122/works" target="_blank" class="nav-card hardware">
                    <div class="nav-title">🧩 开源硬件工程</div>
                    <div class="nav-desc">查看我所有的硬件设计作品</div>
                    <div class="nav-arrow">→ 前往 OSHWHub</div>
                </a>
            </div>
        </div>

        <div class="divider"></div>

        <!-- ===== 2. 代码 ===== -->
        <div class="section">
            <h2 class="section-title">代码</h2>
            <div class="nav-grid">
                <a href="https://github.com/1225297600" target="_blank" class="nav-card code">
                    <div class="nav-title">💻 开源代码仓库</div>
                    <div class="nav-desc">嵌入式驱动、工具库、项目源码</div>
                    <div class="nav-arrow">→ 前往 GitHub</div>
                </a>
            </div>
        </div>

        <div class="divider"></div>

        <!-- ===== 3. 文章 ===== -->
        <div class="section">
            <h2 class="section-title">文章</h2>
            <div class="nav-grid">
                <a href="https://blog.csdn.net/zhangsanpang?type=blog" target="_blank" class="nav-card articles">
                    <div class="nav-title">📝 技术博客</div>
                    <div class="nav-desc">嵌入式、ZYNQ、STM32 实战经验</div>
                    <div class="nav-arrow">→ 前往 CSDN</div>
                </a>
            </div>
        </div>

        <div class="divider"></div>

        <!-- ===== 4. 工具（保留完整） ===== -->
        <div class="section">
            <h2 class="section-title">工具 <span class="badge">实用小工具</span></h2>

            <!-- 筛选 & 搜索 -->
            <div class="filter-controls">
                <button class="filter-btn active" data-filter="all">全部</button>
                <button class="filter-btn" data-filter="编程">编程</button>
                <button class="filter-btn" data-filter="转换">转换</button>
                <button class="filter-btn" data-filter="网络">网络</button>
                <button class="filter-btn" data-filter="其他">其他</button>
            </div>

            <div class="search-box">
                <input type="text" id="tool-search" placeholder="搜索工具...">
            </div>

            <div class="link-grid" id="tools-container">
                <!-- 由 JS 动态渲染 -->
                <div class="loading">加载工具中...</div>
            </div>
        </div>

        <div class="divider"></div>

        <!-- ===== FOOTER ===== -->
        <footer>
            <p>© 2023 ZZL个人主页 · <a href="https://github.com/1225297600/1225297600.github.com/blob/main/index.html/" target="_blank">编辑此页</a></p>
        </footer>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {

            // ============================================================
            //  工具数据
            // ============================================================
            const toolsData = [{
                title: "CSV数字转表头工具",
                url: "https://1225297600.github.io/tool_csv_num2head.html",
                desc: "将CSV文件的数字列索引转换为Excel风格的字母表头",
                category: "编程"
            }, {
                title: "Modbus工具",
                url: "https://modbuskit.com/zh/modbus-rtu",
                desc: "报文组包、校验和解包工具",
                category: "网络"
            }, {
                title: "UNIX时间戳转换",
                url: "https://tool.chinaz.com/tools/unixtime.aspx",
                desc: "UNIX时间戳与日期时间相互转换，支持多种编程语言",
                category: "转换"
            }, {
                title: "IEEE754浮点数转换",
                url: "https://www.asciim.cn/hex/float.html",
                desc: "IEEE754浮点数与十六进制相互转换",
                category: "转换"
            }, {
                title: "字符计数工具",
                url: "https://charactercalculator.com/zh-cn/",
                desc: "统计字符数、字数、段落数等",
                category: "其他"
            }, {
                title: "JSON在线查看器",
                url: "https://www.bejson.com/jsonviewernew/",
                desc: "格式化、加转义符、去除转义符、查看结构树",
                category: "编程"
            }, {
                title: "JSON编辑工具",
                url: "https://www.json.cn/jsonedit/",
                desc: "以对象方式编辑，文本与对象相互转换",
                category: "编程"
            }];

            // ============================================================
            //  渲染工具
            // ============================================================
            const container = document.getElementById('tools-container');
            const filterBtns = document.querySelectorAll('.filter-btn');
            const searchInput = document.getElementById('tool-search');

            let currentFilter = 'all';
            let currentKeyword = '';

            function renderTools() {
                const filtered = toolsData.filter(tool => {
                    // 分类筛选
                    if (currentFilter !== 'all' && tool.category !== currentFilter) return false;
                    // 关键词搜索
                    if (currentKeyword) {
                        const kw = currentKeyword.toLowerCase();
                        const match = tool.title.toLowerCase().includes(kw) ||
                            tool.desc.toLowerCase().includes(kw) ||
                            tool.category.toLowerCase().includes(kw);
                        if (!match) return false;
                    }
                    return true;
                });

                if (filtered.length === 0) {
                    container.innerHTML = '<div class="loading">没有匹配的工具</div>';
                    return;
                }

                container.innerHTML = '';
                filtered.forEach(tool => {
                    const card = document.createElement('div');
                    card.className = 'link-card';
                    card.innerHTML = `
                        <a href="${tool.url}" target="_blank">${tool.title}</a>
                        <div class="link-description">${tool.desc}</div>
                        <div class="link-meta">
                            <span class="tool-tag">${tool.category}</span>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }

            // ============================================================
            //  事件绑定
            // ============================================================
            filterBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentFilter = this.dataset.filter;
                    renderTools();
                });
            });

            searchInput.addEventListener('input', function() {
                currentKeyword = this.value.trim();
                renderTools();
            });

            // ============================================================
            //  初始渲染
            // ============================================================
            renderTools();

        });
    </script>

</body>
</html>
